  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;padding-bottom:70px;}
    /* ---- LAYOUT ---- */
    header{background:#2563eb;color:#fff;padding:14px 16px;position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.2);}
    header h1{font-size:18px;font-weight:800;letter-spacing:-.3px;}
    header nav{display:none;}
    @media(min-width:768px){header{display:flex;align-items:center;justify-content:space-between;} header nav{display:flex;gap:8px;} body{padding-bottom:0;}}
    header nav button{background:transparent;border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
    header nav button.active{background:rgba(255,255,255,.2);}
    main{max-width:900px;margin:0 auto;padding:16px;}
    /* ---- BOTTOM NAV ---- */
    .bottom-nav{display:flex;position:fixed;bottom:0;width:100%;background:#fff;border-top:1px solid #e2e8f0;z-index:30;padding:8px 0 calc(8px + env(safe-area-inset-bottom));}
    .bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;font-size:10px;font-weight:800;color:#94a3b8;cursor:pointer;padding:4px 0;letter-spacing:.5px;}
    .bottom-nav button.active{color:#2563eb;}
    .bottom-nav button .nav-icon{font-size:20px;line-height:1;}
    @media(min-width:768px){.bottom-nav{display:none;}}
    /* ---- CARDS / UI ---- */
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;}
    .card-p{padding:16px;}
    .section-title{font-size:18px;font-weight:800;color:#1e293b;margin-bottom:12px;}
    /* ---- BUTTONS ---- */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:8px;font-weight:700;font-size:14px;border:none;cursor:pointer;transition:all .15s;}
    .btn-primary{background:#2563eb;color:#fff;}
    .btn-primary:hover{background:#1d4ed8;}
    .btn-secondary{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;}
    .btn-secondary:hover{background:#e2e8f0;}
    .btn-danger{background:#dc2626;color:#fff;}
    .btn-sm{padding:6px 10px;font-size:12px;border-radius:6px;}
    /* ---- INPUTS ---- */
    input,textarea,select{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;font-family:inherit;background:#fff;}
    input:focus,textarea:focus,select:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
    textarea{resize:vertical;font-family:monospace;}
    /* ---- COUNTER ---- */
    .counter{display:flex;align-items:center;gap:4px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;padding:4px;}
    .counter button{width:30px;height:30px;border:none;background:transparent;border-radius:6px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .counter button:hover:not(:disabled){background:#fff;}
    .counter button:disabled{opacity:.25;cursor:default;}
    .counter span{font-weight:700;width:24px;text-align:center;font-size:13px;}
    /* ---- PROGRESS ---- */
    .progress-bar{height:8px;background:#e2e8f0;border-radius:99px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:99px;transition:width .4s ease;}
    .progress-fill.blue{background:#3b82f6;}
    .progress-fill.amber{background:#f59e0b;}
    .progress-fill.green{background:#22c55e;}
    /* ---- TAGS ---- */
    .tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
    .tag-blue{background:#dbeafe;color:#1d4ed8;}
    .tag-purple{background:#ede9fe;color:#6d28d9;}
    .tag-green{background:#dcfce7;color:#15803d;}
    .tag-amber{background:#fef3c7;color:#b45309;}
    .tag-red{background:#fee2e2;color:#b91c1c;}
    .tag-slate{background:#f1f5f9;color:#475569;}
    /* ---- LISTS ---- */
    .list-item{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:background .1s;}
    .list-item:hover{background:#f8fafc;}
    .list-item+.list-item{border-top:1px solid #f1f5f9;}
    .list-item.green{background:#f0fdf4;}
    /* ---- TOAST ---- */
    #toast{position:fixed;bottom:80px;right:16px;z-index:99;padding:12px 16px;border-radius:10px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:all .3s;opacity:0;transform:translateY(10px);pointer-events:none;}
    #toast.show{opacity:1;transform:translateY(0);}
    #toast.success{background:#16a34a;color:#fff;}
    #toast.error{background:#dc2626;color:#fff;}
    @media(min-width:768px){#toast{bottom:24px;}}
    /* ---- GRID ---- */
    .grid-2{display:grid;grid-template-columns:1fr;gap:12px;}
    @media(min-width:600px){.grid-2{grid-template-columns:1fr 1fr;}}
    /* ---- MISC ---- */
    .empty{padding:48px 16px;text-align:center;color:#94a3b8;font-size:14px;}
    .divider{border:none;border-top:1px solid #f1f5f9;margin:0;}
    .flex{display:flex;align-items:center;gap:8px;}
    .flex-between{display:flex;align-items:center;justify-content:space-between;gap:8px;}
    .mono{font-family:monospace;font-size:11px;color:#94a3b8;text-transform:uppercase;}
    .sub-tabs{display:flex;gap:6px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:6px;}
    .sub-tab{flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:#64748b;transition:all .15s;}
    .sub-tab.active{background:#2563eb;color:#fff;box-shadow:0 1px 4px rgba(37,99,235,.3);}
    .filters-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
    .filter-btn{padding:6px 12px;border-radius:8px;border:1px solid #e2e8f0;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:#475569;}
    .filter-btn.active{background:#2563eb;color:#fff;border-color:#2563eb;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;display:flex;align-items:flex-end;padding:0;}
    @media(min-width:600px){.modal-overlay{align-items:center;padding:16px;}}
    .modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;}
    @media(min-width:600px){.modal{border-radius:16px;max-width:520px;margin:auto;}}
    .modal h2{font-size:18px;font-weight:800;margin-bottom:16px;}
    .gap-8{gap:8px;}
    .gap-12{gap:12px;}
    .mt-8{margin-top:8px;}
    .mt-12{margin-top:12px;}
    .mt-16{margin-top:16px;}
    .mb-8{margin-bottom:8px;}
    .mb-12{margin-bottom:12px;}
    .w100{width:100%;}
    .text-sm{font-size:13px;}
    .text-xs{font-size:11px;}
    .font-bold{font-weight:700;}
    .font-black{font-weight:900;}
    .text-muted{color:#64748b;}
    .text-blue{color:#2563eb;}
    .text-green{color:#16a34a;}
    .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hidden{display:none!important;}
    .spinner{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:14px;color:#64748b;}

// ─────────────────────────────────────────────
//  STORAGE
// ─────────────────────────────────────────────
function loadStorage() {
  try {
    const d = localStorage.getItem('tcg_decks');
    const c = localStorage.getItem('tcg_collection');
    if (d) state.decks = JSON.parse(d);
    if (c) state.collection = JSON.parse(c);
  } catch(e) { console.error(e); }
}
function saveStorage() {
  try {
    localStorage.setItem('tcg_decks', JSON.stringify(state.decks));
    localStorage.setItem('tcg_collection', JSON.stringify(state.collection));
  } catch(e) { showToast('Falha ao salvar dados.', 'error'); }
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = (type==='success'?'✓ ':'✕ ') + msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function genId() {
  return (typeof crypto !== 'undefined' && crypto.randomUUID)
    ? crypto.randomUUID()
    : Date.now().toString(36) + Math.random().toString(36).slice(2);
}
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function parseInput(text) {
  let invalid = 0;
  const cards = text.split('\n').map(l=>l.trim()).filter(Boolean).reduce((acc, line) => {
    const parts = line.split(/\s+/);
    if (parts.length < 3) { invalid++; return acc; }
    let qty = 1;
    if (!isNaN(parseInt(parts[0],10))) qty = Math.max(1, parseInt(parts.shift(),10));
    const number = parts.pop();
    const set = parts.pop();
    const name = parts.join(' ');
    if (!name || !set || !number) { invalid++; return acc; }
    acc.push({ id: `${set}_${number}`, qty, name, set, number });
    return acc;
  }, []);
  return { cards, invalidCount: invalid };
}
function calcProgress(deckCards) {
  if (!deckCards || !deckCards.length) return 0;
  const total = deckCards.reduce((a,c)=>a+c.qty,0);
  const owned = deckCards.reduce((a,c)=>a+Math.min(state.collection[c.id]?.qty||0, c.qty),0);
  return total===0?0:Math.floor((owned/total)*100);
}
function updateCollectionQty(card, delta, exact=null) {
  const cur = state.collection[card.id]?.qty || 0;
  let next = exact !== null ? exact : cur + delta;
  if (next < 0) next = 0;
  if (next === 0) delete state.collection[card.id];
  else state.collection[card.id] = { ...card, qty: next };
  saveStorage();
  render();
}
function allDecks() { return [...state.decks, ...PRESET_DECKS]; }
function selectedDeck() {
  if (!state.selectedDeckId) return null;
  return allDecks().find(d => d.id === state.selectedDeckId) || null;
}
function copyDeck(deck) {
  const txt = deck.cards.map(c=>`${c.qty} ${c.name} ${c.set} ${c.number}`).join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(()=>showToast(`Deck "${deck.name}" copiado!`)).catch(()=>fallbackCopy(txt,deck.name));
  } else { fallbackCopy(txt, deck.name); }
}
function fallbackCopy(txt, name) {
  const el = document.createElement('textarea');
  el.value = txt; el.style.position='fixed'; el.style.opacity='0';
  document.body.appendChild(el); el.focus(); el.select();
  try { document.execCommand('copy'); showToast(`Deck "${name}" copiado!`); }
  catch { showToast('Erro ao copiar.','error'); }
  document.body.removeChild(el);
}

  });

  html += `</div></div>`;
  return html;
}

// ─────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────
function attachEvents() {
  const app = document.getElementById('app');

  // Navigation
  app.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => {
      state.tab = el.dataset.nav;
      state.selectedDeckId = null;
      state.confirmDeleteId = null;
      state.showAddDeck = false;
      render();
    });
  });

  // League sub-tabs
  app.querySelectorAll('[data-league-tab]').forEach(el => {
    el.addEventListener('click', () => {
      state.leagueTab = el.dataset.leagueTab;
      state.selectedSet = null;
      state.setSearch = '';
      render();
    });
  });

  // Open deck
  app.querySelectorAll('[data-open-deck]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('[data-ask-delete],[data-confirm-delete],[data-cancel-delete]')) return;
      state.selectedDeckId = el.dataset.openDeck;
      render();
    });
  });

  // Open set
  app.querySelectorAll('[data-open-set]').forEach(el => {
    el.addEventListener('click', () => { state.selectedSet = el.dataset.openSet; render(); });
  });

  // Back buttons
  const backDeck = document.getElementById('btn-back-deck');
  if (backDeck) backDeck.addEventListener('click', () => { state.selectedDeckId = null; render(); });

  const backSets = document.getElementById('btn-back-sets');
  if (backSets) backSets.addEventListener('click', () => { state.selectedSet = null; state.setSearch = ''; render(); });

  // Add deck
  const btnAddDeck = document.getElementById('btn-add-deck');
  if (btnAddDeck) btnAddDeck.addEventListener('click', () => { state.showAddDeck = !state.showAddDeck; render(); });

  const btnCancelDeck = document.getElementById('btn-cancel-deck');
  if (btnCancelDeck) btnCancelDeck.addEventListener('click', () => {
    state.showAddDeck = false; state.newDeckName=''; state.newDeckDesc=''; state.newDeckList=''; render();
  });

  const btnSaveDeck = document.getElementById('btn-save-deck');
  if (btnSaveDeck) btnSaveDeck.addEventListener('click', () => {
    const name = document.getElementById('inp-deck-name').value.trim();
    const desc = document.getElementById('inp-deck-desc').value.trim();
    const list = document.getElementById('inp-deck-list').value;
    if (!name) return showToast('O deck precisa ter um nome.','error');
    const { cards, invalidCount } = parseInput(list);
    if (invalidCount) showToast(`${invalidCount} linha(s) ignoradas.`,'error');
    if (!cards.length) return showToast('Adicione cartas válidas.','error');
    if (cards.reduce((a,c)=>a+c.qty,0)>60) return showToast('Deck ultrapassa 60 cartas.','error');
    state.decks.push({ id: genId(), name, description: desc, cards, createdAt: Date.now() });
    state.showAddDeck = false; state.newDeckName=''; state.newDeckDesc=''; state.newDeckList='';
    saveStorage(); showToast('Deck salvo!'); render();
  });

  // Keep form values while typing
  ['inp-deck-name','inp-deck-desc','inp-deck-list'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => {
      if (id==='inp-deck-name') state.newDeckName = el.value;
      if (id==='inp-deck-desc') state.newDeckDesc = el.value;
      if (id==='inp-deck-list') state.newDeckList = el.value;
    });
  });

  // Delete deck
  app.querySelectorAll('[data-ask-delete]').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation(); state.confirmDeleteId = el.dataset.askDelete; render(); });
  });
  app.querySelectorAll('[data-confirm-delete]').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation();
      state.decks = state.decks.filter(d=>d.id!==el.dataset.confirmDelete);
      state.confirmDeleteId = null; saveStorage(); showToast('Deck excluído.'); render();
    });
  });
  const btnCancelDel = app.querySelector('[data-cancel-delete]');
  if (btnCancelDel) btnCancelDel.addEventListener('click', (e) => { e.stopPropagation(); state.confirmDeleteId=null; render(); });

  // Copy deck
  const btnCopy = document.getElementById('btn-copy-deck');
  if (btnCopy) btnCopy.addEventListener('click', () => { const d=selectedDeck(); if(d) copyDeck(d); });

  // Toggle card complete in deck
  app.querySelectorAll('[data-toggle-card]').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation();
      const card = JSON.parse(el.dataset.toggleCard);
      updateCollectionQty(card, 0, card._complete ? 0 : card.qty);
    });
  });

  // Counter buttons - deck cards
  app.querySelectorAll('[data-deck-card]').forEach(el => {
    el.addEventListener('click', () => {
      const card = JSON.parse(el.dataset.deckCard);
      updateCollectionQty(card, parseInt(el.dataset.delta));
    });
  });

  // Counter buttons - pool cards
  app.querySelectorAll('[data-pool-card]').forEach(el => {
    el.addEventListener('click', () => {
      const card = JSON.parse(el.dataset.poolCard);
      updateCollectionQty(card, parseInt(el.dataset.delta));
    });
  });

  // Counter buttons - set cards
  app.querySelectorAll('[data-set-card]').forEach(el => {
    el.addEventListener('click', () => {
      const card = JSON.parse(el.dataset.setCard);
      updateCollectionQty(card, parseInt(el.dataset.delta));
    });
  });

  // Counter buttons - global collection
  app.querySelectorAll('[data-coll-card]').forEach(el => {
    el.addEventListener('click', () => {
      const card = JSON.parse(el.dataset.collCard);
      updateCollectionQty(card, parseInt(el.dataset.delta));
    });
  });

  // Pool filter buttons
  app.querySelectorAll('[data-pool-filter]').forEach(el => {
    el.addEventListener('click', () => { state.poolFilter = el.dataset.poolFilter; render(); });
  });

  // Manual collection add
  const manualEl = document.getElementById('manual-entry');
  if (manualEl) manualEl.addEventListener('input', () => { state.manualEntry = manualEl.value; });

  const btnAddColl = document.getElementById('btn-add-collection');
  if (btnAddColl) btnAddColl.addEventListener('click', () => {
    const text = document.getElementById('manual-entry').value;
    if (!text.trim()) return;
    const { cards, invalidCount } = parseInput(text);
    if (invalidCount) showToast(`${invalidCount} linha(s) ignoradas.`,'error');
    if (!cards.length) return;
    cards.forEach(item => {
      const existing = state.collection[item.id];
      state.collection[item.id] = { ...item, qty: (existing?.qty||0) + item.qty };
    });
    state.manualEntry = '';
    saveStorage(); showToast('Coleção atualizada!'); render();
  });

  // Update PT names
  const btnPT = document.getElementById('btn-update-pt');
  if (btnPT) btnPT.addEventListener('click', () => {
    const ptMap = {};
    allDecks().forEach(deck => deck.cards.forEach(card => {
      if (card.id && card.name && !ptMap[card.id]) ptMap[card.id] = card.name;
    }));
    let count = 0;
    Object.keys(state.collection).forEach(id => {
      if (ptMap[id] && state.collection[id].name !== ptMap[id]) {
        state.collection[id].name = ptMap[id]; count++;
      }
    });
    if (!count) return showToast('Nenhuma carta para atualizar.','error');
    saveStorage(); showToast(`${count} carta(s) atualizada(s)!`); render();
  });

  // Android back button support
  window.onpopstate = () => {
    if (state.selectedDeckId) { state.selectedDeckId=null; render(); }
    else if (state.selectedSet) { state.selectedSet=null; render(); }
  };
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
loadStorage();
render();

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
