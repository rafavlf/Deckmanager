      { name: "Máquina de MT", type: "Item", prints: ["DRI #181"], desc: "Procure por até 3 cartas de Ferramenta Pokémon no seu baralho que tenham 'Máquina Técnica' em seu nome, revele-as e coloque-as na sua mão." },
      { name: "Levincia", type: "Estádio", prints: ["DRI #244"], desc: "Uma vez durante o turno de cada jogador, aquele jogador poderá colocar até 2 cartas de Energia [L] Básica da própria pilha de descarte na própria mão." },
      { name: "Fanfarra de Celebração", type: "Estádio", prints: ["MEP #28"], desc: "Uma vez durante o turno de cada jogador, aquele jogador poderá curar 10 pontos de dano de cada um dos seus próprios Pokémon. Se curou qualquer dano desta forma, o turno dele acabará." },
      { name: "Energia Planta", type: "Energia", prints: ["MEE #1"], desc: "Energia Básica [G]." },
      { name: "Energia Fogo", type: "Energia", prints: ["MEE #2"], desc: "Energia Básica [R]." },
      { name: "Energia Água", type: "Energia", prints: ["MEE #3"], desc: "Energia Básica [W]." },
      { name: "Energia Raio", type: "Energia", prints: ["MEE #4"], desc: "Energia Básica [L]." },
      { name: "Energia Psíquica", type: "Energia", prints: ["MEE #5"], desc: "Energia Básica [P]." },
      { name: "Energia Luta", type: "Energia", prints: ["MEE #6"], desc: "Energia Básica [F]." },
      { name: "Energia Escuridão", type: "Energia", prints: ["MEE #7"], desc: "Energia Básica [D]." },
      { name: "Energia Metal", type: "Energia", prints: ["MEE #8"], desc: "Energia Básica [M]." },
    ];


    function App() {
      const [decks, setDecks] = useState([]);
      const [collection, setCollection] = useState({});
      const [activeTab, setActiveTab] = useState('decks');
      const [selectedDeckId, setSelectedDeckId] = useState(null);
      
      const [toast, setToast] = useState(null);
      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const [confirmDeleteId, setConfirmDeleteId] = useState(null);

      const [isAddingDeck, setIsAddingDeck] = useState(false);
      const [newDeckName, setNewDeckName] = useState('');
      const [newDeckDescription, setNewDeckDescription] = useState('');
      const [newDeckList, setNewDeckList] = useState('');
      const [manualCollectionEntry, setManualCollectionEntry] = useState('');

      const [isLoading, setIsLoading] = useState(true);
      const [leagueView, setLeagueView] = useState('decks');
      const [poolFilter, setPoolFilter] = useState('todos');
      const [poolSearch, setPoolSearch] = useState('');

      const isPortuguese = (name) => {
        if (!name) return false;
        const ptPatterns = [
          /da equipe/i, /fábrica/i, /transceptor/i, /próton/i, /petrel/i,
          /archer/i, /ariana/i, /giovanni/i,
          /bola ultra/i, /bola ninho/i, /bola amiga/i, /bola premier/i,
          /pesquisa do professor/i, /ordens do chefe/i, /iono/i,
          /troca/i, /treinador/i, /energia/i, /remendo/i,
          /corretor noturno/i, /amigo íntimo/i, /poffin/i,
          /companheiro/i, /rastreador/i, /bengala/i,
          /escotilha/i, /desvio/i, /rede pokémon/i,
          /energia básica/i, /energia especial/i,
          /fogo/i, /água/i, /grama/i, /psíquico/i, /sombrio/i, /metálico/i,
        ];
        return ptPatterns.some(pattern => pattern.test(name));
      };

      const allDecks = useMemo(() => [...decks, ...PRESET_DECKS], [decks]);
      const sortedUserDecks = useMemo(() => [...decks].sort((a, b) => b.createdAt - a.createdAt), [decks]);
      
      const calculateProgress = (deckCards) => {
        if (!deckCards || deckCards.length === 0) return 0;
        const totalReq = deckCards.reduce((acc, c) => acc + c.qty, 0);
        const totalOwned = deckCards.reduce((acc, c) => acc + Math.min(collection[c.id]?.qty || 0, c.qty), 0);
        return totalReq === 0 ? 0 : Math.floor((totalOwned / totalReq) * 100);
      };

      const deckProgress = useMemo(() => {
        const map = {};
        allDecks.forEach(d => { map[d.id] = calculateProgress(d.cards); });
        return map;
      }, [allDecks, collection]);

      const selectedDeck = useMemo(() => {
        if (!selectedDeckId) return null;
        return allDecks.find(d => d.id === selectedDeckId) || null;
      }, [allDecks, selectedDeckId]);

      // LOAD DATA FROM LOCAL STORAGE
      useEffect(() => {
        try {
          const savedDecks = localStorage.getItem('tcg_decks');
          const savedCollection = localStorage.getItem('tcg_collection');
          if (savedDecks) setDecks(JSON.parse(savedDecks));
          if (savedCollection) setCollection(JSON.parse(savedCollection));
        } catch (error) {
          console.error("Erro ao carregar dados locais:", error);
        } finally {
          setIsLoading(false);
        }
      }, []);

      // SAVE DATA TO LOCAL STORAGE
      const syncData = (newDecks, newCollection) => {
        setDecks(newDecks);
        setCollection(newCollection);
        try {
          localStorage.setItem('tcg_decks', JSON.stringify(newDecks));
          localStorage.setItem('tcg_collection', JSON.stringify(newCollection));
        } catch (err) {
          console.error('Erro ao salvar no Local Storage:', err);
          showToast("Falha ao salvar dados.", "error");
        }
      };

      const parseInput = (text) => {
        let invalidLinesCount = 0;
        const rawParsed = text.split('\n')
          .map(line => line.trim())
          .filter(line => line.length > 0);

        const parsed = rawParsed.reduce((acc, line) => {
          const parts = line.split(/\s+/);
          if (parts.length < 3) {
            invalidLinesCount++;
            return acc;
          }
          
          let qty = 1;
          if (!isNaN(parseInt(parts[0], 10))) {
            qty = Math.max(1, parseInt(parts.shift(), 10));
          }
          
          const number = parts.pop();
          const set = parts.pop();
          const name = parts.join(' ');
          
          if (!name || !set || !number) {
            invalidLinesCount++;
            return acc;
          }

          acc.push({ id: `${set}_${number}`, qty, name, set, number });
          return acc;
        }, []);

        return { cards: parsed, invalidCount: invalidLinesCount };
      };

      const updateCollectionQty = (card, delta, exactValue = null) => {
        const newCollection = { ...collection };
        const currentEntry = newCollection[card.id];
        const currentQty = currentEntry?.qty || 0;
        let nextQty = exactValue !== null ? exactValue : currentQty + delta;
        if (nextQty < 0) nextQty = 0;

        if (nextQty === 0) {
          delete newCollection[card.id];
        } else {
          let finalName = card.name;
          if (currentEntry) {
            const currentIsPT = isPortuguese(currentEntry.name);
            const newIsPT = isPortuguese(card.name);
            
            if (currentIsPT && !newIsPT) {
              finalName = currentEntry.name; 
            } else if (!currentIsPT && newIsPT) {
              finalName = card.name; 
            }
          }
          newCollection[card.id] = { ...card, name: finalName, qty: nextQty };
        }
        syncData(decks, newCollection);
      };

      const copyDeckToClipboard = async (deck) => {
        let output = deck.cards.map(c => `${c.qty} ${c.name} ${c.set} ${c.number}`).join('\n');
        try {
          await navigator.clipboard.writeText(output);
          showToast(`Deck "${deck.name}" copiado!`);
        } catch {
          const el = document.createElement('textarea');
          el.value = output;
          el.style.position = 'fixed';
          el.style.opacity = '0';
          document.body.appendChild(el);
          el.focus();
          el.select();
          try { 
            document.execCommand('copy'); 
            showToast(`Deck "${deck.name}" copiado!`);
          } catch {
            showToast("Erro ao copiar.", "error");
          }
          document.body.removeChild(el);
        }
      };

      const handleUpdateToPT = () => {
        const ptNameMap = {};
        allDecks.forEach(deck => {
          deck.cards.forEach(card => {
            if (card.id && card.name && isPortuguese(card.name)) {
              if (!ptNameMap[card.id]) {
                ptNameMap[card.id] = card.name;
              }
            }
          });
        });

        let updatedCount = 0;
        const newCollection = { ...collection };
        
        Object.keys(newCollection).forEach(cardId => {
          const entry = newCollection[cardId];
          if (!isPortuguese(entry.name) && ptNameMap[cardId]) {
            newCollection[cardId] = { ...entry, name: ptNameMap[cardId] };
            updatedCount++;
          }
        });

        if (updatedCount === 0) {
          showToast("Nenhuma carta para atualizar.", "error");
          return;
        }

        syncData(decks, newCollection);
        showToast(`${updatedCount} carta(s) atualizada(s) para português!`);
      };

      if (isLoading) return <div className="min-h-screen flex items-center justify-center bg-slate-50">Carregando dados...</div>;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 pb-20 md:pb-0 font-sans">
          
          {toast && (
            <div className={`fixed bottom-4 right-4 p-4 rounded-lg shadow-2xl z-50 animate-in slide-in-from-right-4 duration-300 ${toast.type === 'error' ? 'bg-red-600' : 'bg-green-600'} text-white font-bold flex items-center gap-2`}>
              {toast.type === 'error' ? <AlertCircle className="w-5 h-5"/> : <Check className="w-5 h-5"/>}
              {toast.message}
            </div>
          )}

          <header className="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-20">
            <div className="max-w-4xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-2">
                <h1 className="text-xl font-bold flex items-center gap-2"><Layers className="w-6 h-6" /> Deck Manager</h1>
              </div>
              <div className="hidden md:flex gap-4">
                <button onClick={() => { setActiveTab('decks'); setSelectedDeckId(null); }} className={`px-3 py-1.5 rounded-lg transition-colors ${activeTab === 'decks' ? 'bg-white/20' : 'hover:bg-white/10'}`}>Meus Decks</button>
                <button onClick={() => { setActiveTab('league'); setSelectedDeckId(null); }} className={`px-3 py-1.5 rounded-lg transition-colors ${activeTab === 'league' ? 'bg-white/20' : 'hover:bg-white/10'}`}>Liga</button>
                <button onClick={() => { setActiveTab('collection'); setSelectedDeckId(null); }} className={`px-3 py-1.5 rounded-lg transition-colors ${activeTab === 'collection' ? 'bg-white/20' : 'hover:bg-white/10'}`}>Coleção</button>
              </div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto p-4 mt-4">
            
            {/* MODAL: NOVO DECK */}
            {isAddingDeck && (
              <div className="bg-white p-6 rounded-xl border border-slate-200 mb-6 animate-in fade-in shadow-sm">
                <h2 className="text-xl font-bold mb-4">Importar Novo Deck</h2>
                <input className="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Nome do Deck" value={newDeckName} onChange={e => setNewDeckName(e.target.value)} />
                <input className="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Descrição (opcional)" value={newDeckDescription} onChange={e => setNewDeckDescription(e.target.value)} maxLength={120} />
                <textarea className="w-full p-3 border rounded-lg h-32 font-mono text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Cole a lista (ex: 4 Torchic DRI 040)" value={newDeckList} onChange={e => setNewDeckList(e.target.value)} />
                <div className="flex justify-end gap-3 mt-4">
                  <button onClick={() => setIsAddingDeck(false)} className="px-4 py-2 text-slate-500">Cancelar</button>
                  <button onClick={() => {
                    if (!newDeckName.trim()) return showToast("O deck precisa ter um nome.", "error");
                    
                    const { cards: parsed, invalidCount } = parseInput(newDeckList);
                    if (invalidCount > 0) showToast(`${invalidCount} linha(s) ignoradas por formato inválido.`, "error");
                    if (parsed.length === 0) return showToast("Adicione cartas válidas ao deck.", "error");
                    if (parsed.reduce((a,b)=>a+b.qty,0) > 60) return showToast("Erro: O deck ultrapassa 60 cartas.", "error");
                    
                    const newDeck = { id: generateId(), name: newDeckName, description: newDeckDescription.trim(), cards: parsed, createdAt: Date.now() };
                    syncData([...decks, newDeck], collection);
                    setIsAddingDeck(false); setNewDeckName(''); setNewDeckDescription(''); setNewDeckList('');
                    showToast("Deck salvo com sucesso!");
                  }} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-md hover:bg-blue-700 transition-colors">Salvar Deck</button>
                </div>
              </div>
            )}

            {/* VIEW: MEUS DECKS */}
            {!isAddingDeck && !selectedDeck && activeTab === 'decks' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-4 rounded-xl border border-slate-200 gap-4 shadow-sm">
                  <h2 className="text-lg font-bold text-slate-700">Meus Decks</h2>
                  <button onClick={() => setIsAddingDeck(true)} className="w-full sm:w-auto bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-blue-700 shadow-md transition-colors">
                    <Plus className="w-4 h-4"/> Novo Deck
                  </button>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                  {sortedUserDecks.map(deck => (
                    <div key={deck.id} onClick={() => setSelectedDeckId(deck.id)} className="bg-white p-5 rounded-xl border border-slate-200 hover:shadow-md transition-all cursor-pointer relative">
                      <h3 className="font-bold text-lg pr-8 truncate">{deck.name}</h3>
                      <p className="text-xs text-slate-500 mt-1 line-clamp-2 h-8">{deck.description || "Sem descrição"}</p>
                      
                      <div className="mt-4">
                        <div className="flex justify-between items-center text-sm mb-1.5">
                          <span className="font-medium text-slate-600">{deckProgress[deck.id]}% completo</span>
                          
                          {confirmDeleteId === deck.id ? (
                            <div className="flex gap-2 animate-in fade-in zoom-in-95" onClick={e => e.stopPropagation()}>
                              <button onClick={() => {
                                const newDecks = decks.filter(d => d.id !== deck.id);
                                syncData(newDecks, collection);
                                setConfirmDeleteId(null);
                                showToast("Deck excluído.");
                              }} className="text-[10px] bg-red-600 text-white px-2 py-1 rounded font-bold uppercase">Excluir</button>
                              <button onClick={() => setConfirmDeleteId(null)} className="text-[10px] bg-slate-200 px-2 py-1 rounded font-bold uppercase">Voltar</button>
                            </div>
                          ) : (
                            <button onClick={e => { e.stopPropagation(); setConfirmDeleteId(deck.id); }} className="text-slate-400 hover:text-red-500 p-1"><Trash2 className="w-4 h-4"/></button>
                          )}
                        </div>
                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                          <div className="bg-blue-500 h-full transition-all duration-500" style={{ width: `${deckProgress[deck.id]}%` }} />
                        </div>
                      </div>
                    </div>
                  ))}
                  {sortedUserDecks.length === 0 && (
                    <div className="col-span-full p-12 text-center text-slate-400 border-2 border-dashed rounded-xl border-slate-200">
                      Nenhum deck criado ainda. Clique em "Novo Deck" para começar.
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* VIEW: LIGA */}
            {activeTab === 'league' && !selectedDeck && (
              <div className="space-y-4 animate-in fade-in">
                {/* Sub-tabs */}
                <div className="flex gap-2 bg-white p-1.5 rounded-xl border border-slate-200 shadow-sm">
                  <button onClick={() => setLeagueView('decks')} className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 ${leagueView === 'decks' ? 'bg-blue-600 text-white shadow' : 'text-slate-500 hover:bg-slate-100'}`}>
                    <Swords className="w-4 h-4"/> Decks
                  </button>
                  <button onClick={() => setLeagueView('pool')} className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 ${leagueView === 'pool' ? 'bg-blue-600 text-white shadow' : 'text-slate-500 hover:bg-slate-100'}`}>
                    <FileText className="w-4 h-4"/> Pool de Cartas
                  </button>
                </div>

                {/* Decks view */}
                {leagueView === 'decks' && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    {PRESET_DECKS.map(deck => (
                      <div key={deck.id} onClick={() => setSelectedDeckId(deck.id)} className="bg-white p-6 rounded-xl border border-slate-200 cursor-pointer hover:shadow-lg transition-all flex flex-col justify-between group">
                        <div>
                          <h3 className="font-bold text-xl flex items-center gap-2 group-hover:text-blue-600 transition-colors"><Swords className="w-5 h-5 text-amber-500"/> {deck.name}</h3>
                          <p className="text-sm text-slate-500 mt-2">{deck.description}</p>
                        </div>
                        <div className="mt-6">
                          <div className="flex justify-between text-sm font-bold mb-1.5 text-slate-700">
                            <span>Progresso de Coleção</span>
                            <span>{deckProgress[deck.id]}%</span>
                          </div>
                          <div className="mt-2 bg-slate-100 h-2.5 rounded-full overflow-hidden">
                            <div className="bg-amber-500 h-full transition-all duration-500 shadow-[0_0_8px_rgba(245,158,11,0.5)]" style={{ width: `${deckProgress[deck.id]}%` }} />
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* Pool view */}
                {leagueView === 'pool' && (() => {
                  const typeColors = { Item: 'bg-blue-100 text-blue-700', Ferramenta: 'bg-purple-100 text-purple-700', Estádio: 'bg-green-100 text-green-700', Energia: 'bg-amber-100 text-amber-700' };
                  const filtered = TRAINER_POOL.filter(c => {
                    const matchType = poolFilter === 'todos' || c.type === poolFilter;
                    const matchSearch = poolSearch === '' || c.name.toLowerCase().includes(poolSearch.toLowerCase());
                    return matchType && matchSearch;
                  });
                  return (
                    <div className="space-y-3">
                      <div className="flex flex-col sm:flex-row gap-2">
                        <input
                          className="flex-1 p-2.5 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500"
                          placeholder="Buscar carta..."
                          value={poolSearch}
                          onChange={e => setPoolSearch(e.target.value)}
                        />
                        <div className="flex gap-1.5 flex-wrap">
                          {['todos','Item','Ferramenta','Estádio','Energia'].map(f => (
                            <button key={f} onClick={() => setPoolFilter(f)}
                              className={`px-3 py-2 rounded-lg text-xs font-bold transition-all border ${poolFilter === f ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>
                              {f === 'todos' ? 'Todos' : f}
                            </button>
                          ))}
                        </div>
                      </div>
                      <p className="text-xs text-slate-400 font-medium">{filtered.length} carta{filtered.length !== 1 ? 's' : ''}</p>
                      <div className="space-y-2">
                        {filtered.map((card, i) => (
                          <div key={i} className="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
                            <div className="flex items-start justify-between gap-3 mb-2">
                              <div className="flex items-center gap-2 flex-wrap">
                                <span className="font-bold text-slate-800">{card.name}</span>
                                <span className={`text-[10px] font-black px-2 py-0.5 rounded-full uppercase tracking-wider ${typeColors[card.type]}`}>{card.type}</span>
                              </div>
                              <div className="flex gap-1 flex-wrap justify-end shrink-0">
                                {card.prints.map((p, j) => (
                                  <span key={j} className="text-[10px] font-mono bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded border border-slate-200">{p}</span>
                                ))}
                              </div>
                            </div>
                            <p className="text-xs text-slate-600 leading-relaxed">{card.desc}</p>
                          </div>
                        ))}
                        {filtered.length === 0 && (
                          <div className="p-12 text-center text-slate-400 border-2 border-dashed rounded-xl border-slate-200">Nenhuma carta encontrada.</div>
                        )}
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}

            {/* VIEW: COLEÇÃO */}
            {activeTab === 'collection' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                  <h2 className="font-bold text-lg mb-4 flex items-center gap-2"><Plus className="w-5 h-5 text-blue-500"/> Adicionar à Coleção</h2>
                  <div className="flex flex-col gap-3">
                    <textarea 
                      className="w-full p-3 border rounded-lg text-sm font-mono h-24 outline-none focus:ring-2 focus:ring-blue-500" 
                      placeholder="Formato: Nome Sigla Número (ex: Torchic DRI 040 ou 4 Torchic DRI 040)"
                      value={manualCollectionEntry}
                      onChange={e => setManualCollectionEntry(e.target.value)}
                    />
                    <button 
                      onClick={() => {
                        if (!manualCollectionEntry.trim()) return;
                        
                        const { cards: items, invalidCount: inv } = parseInput(manualCollectionEntry);
                        if (inv > 0) showToast(`${inv} linha(s) ignoradas por formato inválido.`, "error");
                        if (items.length === 0) return;

                        let newColl = { ...collection };
                        items.forEach(item => {
                          const existing = newColl[item.id];
                          const finalName = (existing && isPortuguese(existing.name) && !isPortuguese(item.name)) ? existing.name : item.name;
                          newColl[item.id] = { ...item, name: finalName, qty: (existing?.qty || 0) + item.qty };
                        });
                        syncData(decks, newColl);
                        setManualCollectionEntry('');
                        showToast("Coleção atualizada!");
                      }}
                      className="bg-blue-600 text-white p-3 rounded-lg font-bold flex items-center justify-center gap-2 shadow-md hover:bg-blue-700 transition-colors"
                    >
                      <Plus className="w-5 h-5"/> Adicionar Cartas
                    </button>
                  </div>
                </div>

                <div className="bg-white rounded-xl border border-slate-200 divide-y shadow-sm overflow-hidden">
                  <div className="bg-slate-50 p-4 font-bold text-slate-600 flex justify-between items-center">
                    <span>Minha Coleção Global</span>
                    <div className="flex items-center gap-3">
                      <button
                        onClick={handleUpdateToPT}
                        className="text-xs bg-blue-50 text-blue-600 border border-blue-200 px-3 py-1.5 rounded-lg flex items-center gap-1.5 hover:bg-blue-100 transition-colors font-bold"
                        title="Atualiza nomes em inglês da coleção para português, usando os decks cadastrados como referência"
                      >
                        <RefreshCw className="w-3.5 h-3.5" /> Atualizar nomes PT
                      </button>
                      <span className="text-xs bg-white px-2 py-1 rounded-full border">{Object.keys(collection).length} tipos únicos</span>
                    </div>
                  </div>
                  {Object.values(collection).sort((a,b)=>a.name.localeCompare(b.name)).map(card => (
                    <div key={card.id} className="p-4 flex justify-between items-center hover:bg-slate-50 transition-colors">
                      <div>
                        <p className="font-bold text-slate-800">{card.name}</p>
                        <p className="text-xs font-mono text-slate-500 uppercase">{card.set} — {card.number}</p>
                      </div>
                      <div className="flex items-center gap-3 bg-slate-100 p-1.5 rounded-lg border border-slate-200">
                        <button onClick={() => updateCollectionQty(card, -1)} className="w-8 h-8 flex items-center justify-center hover:bg-white rounded shadow-sm transition-colors font-bold disabled:opacity-30" disabled={card.qty <= 0}>-</button>
                        <span className="font-bold w-6 text-center text-blue-600">{card.qty}</span>
                        <button onClick={() => updateCollectionQty(card, 1)} className="w-8 h-8 flex items-center justify-center hover:bg-white rounded shadow-sm transition-colors font-bold">+</button>
                      </div>
                    </div>
                  ))}
                  {Object.keys(collection).length === 0 && (
                    <div className="p-12 text-center text-slate-400">Nenhuma carta na coleção ainda.</div>
                  )}
                </div>
              </div>
            )}

            {/* VIEW: DETALHE DO DECK (PERSONALIZADO OU LIGA) */}
            {selectedDeck && (
              <div className="bg-white rounded-xl border border-slate-200 overflow-hidden animate-in slide-in-from-right-4 shadow-lg">
                <div className="p-5 bg-slate-50 border-b flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                  <div>
                    <button onClick={() => setSelectedDeckId(null)} className="flex items-center gap-1 text-blue-600 font-bold mb-2 hover:underline transition-all"><ArrowLeft className="w-4 h-4"/> Voltar</button>
                    <div className="flex items-center gap-3">
                       <h2 className="text-xl sm:text-2xl font-black text-slate-800">{selectedDeck.name}</h2>
                       {PRESET_DECKS.some(p => p.id === selectedDeck.id) && <span className="bg-amber-100 text-amber-700 text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-wider">Liga</span>}
                    </div>
                    {selectedDeck.description && <p className="text-sm text-slate-500 mt-1">{selectedDeck.description}</p>}
                  </div>
                  <button onClick={() => copyDeckToClipboard(selectedDeck)} className="w-full sm:w-auto p-3 bg-white border border-slate-300 rounded-lg shadow-sm hover:bg-slate-50 flex items-center justify-center gap-2 font-bold transition-all"><ClipboardCopy className="w-4 h-4"/> Copiar Lista</button>
                </div>
                <div className="p-4 space-y-2">
                  <div className="flex justify-between items-center text-xs font-black text-slate-400 uppercase tracking-widest mb-4">
                    <div className="flex items-center gap-2">
                      <div className="w-24 h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div className="bg-blue-600 h-full" style={{ width: `${deckProgress[selectedDeck.id]}%` }} />
                      </div>
                      <span>{deckProgress[selectedDeck.id]}% completo</span>
                    </div>
                    <span>{selectedDeck.cards.reduce((a,b)=>a+b.qty,0)} cartas totais</span>
                  </div>
                  <div className="grid grid-cols-1 gap-2">
                    {selectedDeck.cards.map((card, i) => {
                      const owned = collection[card.id]?.qty || 0;
                      const isComplete = owned >= card.qty;
                      return (
                        <div key={i} className={`p-3 rounded-xl border flex justify-between items-center transition-all ${isComplete ? 'bg-green-50 border-green-200 shadow-sm' : 'bg-white border-slate-100'}`}>
                          <div className="flex items-center gap-3 flex-1 min-w-0">
                            <button onClick={() => updateCollectionQty(card, 0, isComplete ? 0 : card.qty)} className={`transition-transform active:scale-90 ${isComplete ? 'text-green-600' : 'text-slate-200'}`}>
                              {isComplete ? <CheckSquare className="w-6 h-6" /> : <Square className="w-6 h-6" />}
                            </button>
                            <div className="truncate">
                              <p className={`font-bold text-sm truncate ${isComplete ? 'text-green-800' : 'text-slate-700'}`}>{card.qty}x {card.name}</p>
                              <p className="text-[10px] font-mono text-slate-400 uppercase">{card.set} {card.number}</p>
                            </div>
                          </div>
                          <div className="flex items-center gap-2 bg-slate-50 rounded-lg p-1 border border-slate-200 ml-4">
                            <button onClick={() => updateCollectionQty(card, -1)} className="w-7 h-7 flex items-center justify-center hover:bg-white rounded transition-colors disabled:opacity-20" disabled={owned <= 0}>-</button>
                            <span className={`text-xs font-bold w-8 text-center font-mono ${owned >= card.qty ? 'text-green-700' : owned > 0 ? 'text-amber-600' : 'text-slate-400'}`}>{owned}/{card.qty}</span>
                            <button onClick={() => updateCollectionQty(card, 1)} className="w-7 h-7 flex items-center justify-center hover:bg-white rounded transition-colors">+</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

          </main>

          {/* MOBILE NAV */}
          <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around p-3 z-30 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] pb-safe">
            <button onClick={() => { setActiveTab('decks'); setSelectedDeckId(null); }} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'decks' ? 'text-blue-600 scale-110' : 'text-slate-400'}`}>
              <Library className="w-6 h-6"/><span className="text-[10px] font-black">DECKS</span>
            </button>
            <button onClick={() => { setActiveTab('league'); setSelectedDeckId(null); }} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'league' ? 'text-blue-600 scale-110' : 'text-slate-400'}`}>
              <Swords className="w-6 h-6"/><span className="text-[10px] font-black">LIGA</span>
            </button>
            <button onClick={() => { setActiveTab('collection'); setSelectedDeckId(null); }} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'collection' ? 'text-blue-600 scale-110' : 'text-slate-400'}`}>
              <Archive className="w-6 h-6"/><span className="text-[10px] font-black">COLEÇÃO</span>
            </button>
          </nav>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
