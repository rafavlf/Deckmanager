    function App() {
      const [decks, setDecks] = useState([]);
      const [collection, setCollection] = useState({});
      const [activeTab, setActiveTab] = useState('decks');
      const [selectedDeckId, setSelectedDeckId] = useState(null);
      
      const [toast, setToast] = useState(null);
      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const [confirmDeleteId, setConfirmDeleteId] = useState(null);

      const [isAddingDeck, setIsAddingDeck] = useState(false);
      const [newDeckName, setNewDeckName] = useState('');
      const [newDeckDescription, setNewDeckDescription] = useState('');
      const [newDeckList, setNewDeckList] = useState('');
      const [manualCollectionEntry, setManualCollectionEntry] = useState('');

      const [isLoading, setIsLoading] = useState(true);
      const [leagueView, setLeagueView] = useState('decks');
      const [poolFilter, setPoolFilter] = useState('todos');
      const [poolSearch, setPoolSearch] = useState('');
      const [selectedSetSigla, setSelectedSetSigla] = useState(null);
      const [setSearch, setSetSearch] = useState('');

      const isPortuguese = (name) => {
        if (!name) return false;
        const ptPatterns = [
          /da equipe/i, /fábrica/i, /transceptor/i, /próton/i, /petrel/i,
          /archer/i, /ariana/i, /giovanni/i,
          /bola ultra/i, /bola ninho/i, /bola amiga/i, /bola premier/i,
          /pesquisa do professor/i, /ordens do chefe/i, /iono/i,
          /troca/i, /treinador/i, /energia/i, /remendo/i,
          /corretor noturno/i, /amigo íntimo/i, /poffin/i,
          /companheiro/i, /rastreador/i, /bengala/i,
          /escotilha/i, /desvio/i, /rede pokémon/i,
          /energia básica/i, /energia especial/i,
          /fogo/i, /água/i, /grama/i, /psíquico/i, /sombrio/i, /metálico/i,
        ];
        return ptPatterns.some(pattern => pattern.test(name));
      };

      const allDecks = useMemo(() => [...decks, ...PRESET_DECKS], [decks]);
      const sortedUserDecks = useMemo(() => [...decks].sort((a, b) => b.createdAt - a.createdAt), [decks]);
      
      const calculateProgress = (deckCards) => {
        if (!deckCards || deckCards.length === 0) return 0;
        const totalReq = deckCards.reduce((acc, c) => acc + c.qty, 0);
        const totalOwned = deckCards.reduce((acc, c) => acc + Math.min(collection[c.id]?.qty || 0, c.qty), 0);
        return totalReq === 0 ? 0 : Math.floor((totalOwned / totalReq) * 100);
      };

      const deckProgress = useMemo(() => {
        const map = {};
        allDecks.forEach(d => { map[d.id] = calculateProgress(d.cards); });
        return map;
      }, [allDecks, collection]);

      const selectedDeck = useMemo(() => {
        if (!selectedDeckId) return null;
        return allDecks.find(d => d.id === selectedDeckId) || null;
      }, [allDecks, selectedDeckId]);

      // LOAD DATA FROM LOCAL STORAGE
      useEffect(() => {
        try {
          const savedDecks = localStorage.getItem('tcg_decks');
          const savedCollection = localStorage.getItem('tcg_collection');
          if (savedDecks) setDecks(JSON.parse(savedDecks));
          if (savedCollection) setCollection(JSON.parse(savedCollection));
        } catch (error) {
          console.error("Erro ao carregar dados locais:", error);
        } finally {
          setIsLoading(false);
        }
      }, []);

      // SAVE DATA TO LOCAL STORAGE
      const syncData = (newDecks, newCollection) => {
        setDecks(newDecks);
        setCollection(newCollection);
        try {
          localStorage.setItem('tcg_decks', JSON.stringify(newDecks));
          localStorage.setItem('tcg_collection', JSON.stringify(newCollection));
        } catch (err) {
          console.error('Erro ao salvar no Local Storage:', err);
          showToast("Falha ao salvar dados.", "error");
        }
      };

      const parseInput = (text) => {
        let invalidLinesCount = 0;
        const rawParsed = text.split('\n')
          .map(line => line.trim())
          .filter(line => line.length > 0);

        const parsed = rawParsed.reduce((acc, line) => {
          const parts = line.split(/\s+/);
          if (parts.length < 3) {
            invalidLinesCount++;
            return acc;
          }
          
          let qty = 1;
          if (!isNaN(parseInt(parts[0], 10))) {
            qty = Math.max(1, parseInt(parts.shift(), 10));
          }
          
          const number = parts.pop();
          const set = parts.pop();
          const name = parts.join(' ');
          
          if (!name || !set || !number) {
            invalidLinesCount++;
            return acc;
          }

          acc.push({ id: `${set}_${number}`, qty, name, set, number });
          return acc;
        }, []);

        return { cards: parsed, invalidCount: invalidLinesCount };
      };

      const updateCollectionQty = (card, delta, exactValue = null) => {
        const newCollection = { ...collection };
        const currentEntry = newCollection[card.id];
        const currentQty = currentEntry?.qty || 0;
        let nextQty = exactValue !== null ? exactValue : currentQty + delta;
        if (nextQty < 0) nextQty = 0;

        if (nextQty === 0) {
          delete newCollection[card.id];
        } else {
          let finalName = card.name;
          if (currentEntry) {
            const currentIsPT = isPortuguese(currentEntry.name);
            const newIsPT = isPortuguese(card.name);
            
            if (currentIsPT && !newIsPT) {
              finalName = currentEntry.name; 
            } else if (!currentIsPT && newIsPT) {
              finalName = card.name; 
            }
          }
          newCollection[card.id] = { ...card, name: finalName, qty: nextQty };
        }
        syncData(decks, newCollection);
      };

      const copyDeckToClipboard = async (deck) => {
        let output = deck.cards.map(c => `${c.qty} ${c.name} ${c.set} ${c.number}`).join('\n');
        try {
          await navigator.clipboard.writeText(output);
          showToast(`Deck "${deck.name}" copiado!`);
        } catch {
          const el = document.createElement('textarea');
          el.value = output;
          el.style.position = 'fixed';
          el.style.opacity = '0';
          document.body.appendChild(el);
          el.focus();
          el.select();
          try { 
            document.execCommand('copy'); 
            showToast(`Deck "${deck.name}" copiado!`);
          } catch {
            showToast("Erro ao copiar.", "error");
          }
          document.body.removeChild(el);
        }
      };

      const handleUpdateToPT = () => {
        const ptNameMap = {};
        allDecks.forEach(deck => {
          deck.cards.forEach(card => {
            if (card.id && card.name && isPortuguese(card.name)) {
              if (!ptNameMap[card.id]) {
                ptNameMap[card.id] = card.name;
              }
            }
          });
        });

        let updatedCount = 0;
        const newCollection = { ...collection };
        
        Object.keys(newCollection).forEach(cardId => {
          const entry = newCollection[cardId];
          if (!isPortuguese(entry.name) && ptNameMap[cardId]) {
            newCollection[cardId] = { ...entry, name: ptNameMap[cardId] };
            updatedCount++;
          }
        });

        if (updatedCount === 0) {
          showToast("Nenhuma carta para atualizar.", "error");
          return;
        }

        syncData(decks, newCollection);
        showToast(`${updatedCount} carta(s) atualizada(s) para português!`);
      };

                    {selectedDeck.description && <p className="text-sm text-slate-500 mt-1">{selectedDeck.description}</p>}
                  </div>
                  <button onClick={() => copyDeckToClipboard(selectedDeck)} className="w-full sm:w-auto p-3 bg-white border border-slate-300 rounded-lg shadow-sm hover:bg-slate-50 flex items-center justify-center gap-2 font-bold transition-all"><ClipboardCopy className="w-4 h-4"/> Copiar Lista</button>
                </div>
                <div className="p-4 space-y-2">
                  <div className="flex justify-between items-center text-xs font-black text-slate-400 uppercase tracking-widest mb-4">
                    <div className="flex items-center gap-2">
                      <div className="w-24 h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div className="bg-blue-600 h-full" style={{ width: `${deckProgress[selectedDeck.id]}%` }} />
                      </div>
                      <span>{deckProgress[selectedDeck.id]}% completo</span>
                    </div>
                    <span>{selectedDeck.cards.reduce((a,b)=>a+b.qty,0)} cartas totais</span>
                  </div>
                  <div className="grid grid-cols-1 gap-2">
                    {selectedDeck.cards.map((card, i) => {
                      const owned = collection[card.id]?.qty || 0;
                      const isComplete = owned >= card.qty;
                      return (
                        <div key={i} className={`p-3 rounded-xl border flex justify-between items-center transition-all ${isComplete ? 'bg-green-50 border-green-200 shadow-sm' : 'bg-white border-slate-100'}`}>
                          <div className="flex items-center gap-3 flex-1 min-w-0">
                            <button onClick={() => updateCollectionQty(card, 0, isComplete ? 0 : card.qty)} className={`transition-transform active:scale-90 ${isComplete ? 'text-green-600' : 'text-slate-200'}`}>
                              {isComplete ? <CheckSquare className="w-6 h-6" /> : <Square className="w-6 h-6" />}
                            </button>
                            <div className="truncate">
                              <p className={`font-bold text-sm truncate ${isComplete ? 'text-green-800' : 'text-slate-700'}`}>{card.qty}x {card.name}</p>
                              <p className="text-[10px] font-mono text-slate-400 uppercase">{card.set} {card.number}</p>
                            </div>
                          </div>
                          <div className="flex items-center gap-2 bg-slate-50 rounded-lg p-1 border border-slate-200 ml-4">
                            <button onClick={() => updateCollectionQty(card, -1)} className="w-7 h-7 flex items-center justify-center hover:bg-white rounded transition-colors disabled:opacity-20" disabled={owned <= 0}>-</button>
                            <span className={`text-xs font-bold w-8 text-center font-mono ${owned >= card.qty ? 'text-green-700' : owned > 0 ? 'text-amber-600' : 'text-slate-400'}`}>{owned}/{card.qty}</span>
                            <button onClick={() => updateCollectionQty(card, 1)} className="w-7 h-7 flex items-center justify-center hover:bg-white rounded transition-colors">+</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

          </main>

          {/* MOBILE NAV */}
          <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around p-3 z-30 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] pb-safe">
            <button onClick={() => { setActiveTab('decks'); setSelectedDeckId(null); }} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'decks' ? 'text-blue-600 scale-110' : 'text-slate-400'}`}>
              <Library className="w-6 h-6"/><span className="text-[10px] font-black">DECKS</span>
            </button>
            <button onClick={() => { setActiveTab('league'); setSelectedDeckId(null); }} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'league' ? 'text-blue-600 scale-110' : 'text-slate-400'}`}>
              <Swords className="w-6 h-6"/><span className="text-[10px] font-black">LIGA</span>
            </button>
            <button onClick={() => { setActiveTab('collection'); setSelectedDeckId(null); }} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'collection' ? 'text-blue-600 scale-110' : 'text-slate-400'}`}>
              <Archive className="w-6 h-6"/><span className="text-[10px] font-black">COLEÇÃO</span>
            </button>
          </nav>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
